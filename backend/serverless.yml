org: victor2424
service: pathforge

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  stage: ${opt:stage, 'dev'}

  environment:
    STAGE: ${self:provider.stage}
    DATABASE_URL: ${env:DATABASE_URL}
    COGNITO_USER_POOL_ID: !Ref CognitoUserPool
    COGNITO_CLIENT_ID: !Ref CognitoUserPoolClient
    SQS_QUEUE_URL: ${env:SQS_QUEUE_URL}
  
  httpApi:
    cors:
      allowedOrigins:
        - http://localhost:3000
        - http://localhost:3001
        - https://pathforge.dev
      allowedHeaders:
        - Content-Type
        - Authorization
        - X-Requested-With
      allowedMethods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      allowCredentials: false

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - logs:CreateLogGroup
            - logs:CreateLogStream
            - logs:PutLogEvents
          Resource: '*'
        - Effect: Allow
          Action:
            - cognito-idp:AdminCreateUser
            - cognito-idp:AdminSetUserPassword
            - cognito-idp:AdminInitiateAuth
            - cognito-idp:AdminGetUser
          Resource: !GetAtt CognitoUserPool.Arn
        - Effect: Allow
          Action:
            - sqs:SendMessage
            - sqs:ReceiveMessage
            - sqs:DeleteMessage
            - sqs:GetQueueAttributes
          Resource: arn:aws:sqs:us-east-1:016562553174:pathforge-code-execution
        - Effect: Allow
          Action:
            - ecr:GetDownloadUrlForLayer
            - ecr:BatchGetImage
            - ecr:BatchCheckLayerAvailability
          Resource: arn:aws:ecr:us-east-1:016562553174:repository/pathforge-executor

build:
  esbuild:
    bundle: true
    minify: true
    sourcemap: false
    target: node20
    platform: node
    exclude:
      - '@prisma/client'
      - '.prisma'
      - '@prisma/engines'
      - 'prisma'

package:
  individually: true
  patterns:
    - '!**'
    - '!node_modules/**'
    - 'node_modules/.prisma/client/libquery_engine-rhel*'
    - 'node_modules/.prisma/client/schema.prisma'
    - 'node_modules/@prisma/client/runtime/**'

plugins:
  - serverless-offline

functions:
  health:
    handler: src/handlers/health.handler
    memorySize: 128
    timeout: 5
    events:
      - httpApi:
          path: /health
          method: get

  authRegister:
    handler: src/handlers/auth-register.handler
    memorySize: 256
    timeout: 10
    events:
      - httpApi:
          path: /auth/register
          method: post

  authLogin:
    handler: src/handlers/auth-login.handler
    memorySize: 256
    timeout: 10
    events:
      - httpApi:
          path: /auth/login
          method: post
  careerDiscovery:
    handler: src/handlers/career-discovery.handler
    memorySize: 256
    timeout: 10
    events:
      - httpApi:
          path: /careers/discover
          method: post
  learningPathList:
    handler: src/handlers/learning-path-list.handler
    memorySize: 256
    timeout: 10
    events:
      - httpApi:
          path: /learning-paths
          method: get

  learningPathGet:
    handler: src/handlers/learning-path-get.handler
    memorySize: 256
    timeout: 10
    events:
      - httpApi:
          path: /learning-paths/{slug}
          method: get

  learningPathEnroll:
    handler: src/handlers/learning-path-enroll.handler
    memorySize: 256
    timeout: 10
    events:
      - httpApi:
          path: /learning-paths/{slug}/enroll
          method: post

  learningPathCompleteModule:
    handler: src/handlers/learning-path-complete-module.handler
    memorySize: 256
    timeout: 10
    events:
      - httpApi:
          path: /learning-paths/{pathId}/modules/{moduleId}/complete
          method: put

  learningPathProgress:
    handler: src/handlers/learning-path-progress.handler
    memorySize: 256
    timeout: 10
    events:
      - httpApi:
          path: /learning-paths/{slug}/progress
          method: get

  learningPathAbandon:
    handler: src/handlers/learning-path-abandon.handler
    memorySize: 256
    timeout: 10
    events:
      - httpApi:
          path: /learning-paths/{pathId}/enroll
          method: delete
  exerciseList:
    handler: src/handlers/exercise-list.handler
    memorySize: 256
    timeout: 10
    events:
      - httpApi:
          path: /exercises
          method: get

  exerciseGet:
    handler: src/handlers/exercise-get.handler
    memorySize: 256
    timeout: 10
    events:
      - httpApi:
          path: /exercises/{slug}
          method: get

  exerciseRun:
    handler: src/handlers/exercise-run.handler
    memorySize: 256
    timeout: 15
    events:
      - httpApi:
          path: /exercises/{slug}/run
          method: post

  exerciseSubmit:
    handler: src/handlers/exercise-submit.handler
    memorySize: 256
    timeout: 15
    events:
      - httpApi:
          path: /exercises/{slug}/submit
          method: post

  submissionGet:
    handler: src/handlers/submission-get.handler
    memorySize: 256
    timeout: 10
    events:
      - httpApi:
          path: /submissions/{submissionId}
          method: get
  codeExecutor:
    image: 016562553174.dkr.ecr.us-east-1.amazonaws.com/pathforge-executor:latest
    memorySize: 512
    timeout: 30
    events:
      - sqs:
          arn: arn:aws:sqs:us-east-1:016562553174:pathforge-code-execution
          batchSize: 1
  conceptsGet:
    handler: src/handlers/concepts-get.handler
    memorySize: 256
    timeout: 10
    events:
      - httpApi:
          path: /concepts/{subjectSlug}
          method: get

  customPathGenerate:
    handler: src/handlers/custom-path-generate.handler
    memorySize: 256
    timeout: 15
    events:
      - httpApi:
          path: /learning-paths/custom/generate
          method: post

  customPathConfirm:
    handler: src/handlers/custom-path-confirm.handler
    memorySize: 256
    timeout: 15
    events:
      - httpApi:
          path: /learning-paths/custom/confirm
          method: post
          

resources:
  Resources:
    CognitoUserPool:
      Type: AWS::Cognito::UserPool
      Properties:
        UserPoolName: pathforge-${self:provider.stage}
        UsernameAttributes:
          - email
        AutoVerifiedAttributes: []
        Policies:
          PasswordPolicy:
            MinimumLength: 8
            RequireUppercase: true
            RequireLowercase: true
            RequireNumbers: true
            RequireSymbols: false
        Schema:
          - Name: email
            AttributeDataType: String
            Required: true
            Mutable: true
          - Name: name
            AttributeDataType: String
            Required: true
            Mutable: true
        AdminCreateUserConfig:
          AllowAdminCreateUserOnly: false

    CognitoUserPoolClient:
      Type: AWS::Cognito::UserPoolClient
      Properties:
        ClientName: pathforge-client-${self:provider.stage}
        UserPoolId: !Ref CognitoUserPool
        ExplicitAuthFlows:
          - ALLOW_ADMIN_USER_PASSWORD_AUTH
          - ALLOW_REFRESH_TOKEN_AUTH
          - ALLOW_USER_SRP_AUTH
        GenerateSecret: false
        AccessTokenValidity: 1
        IdTokenValidity: 1
        RefreshTokenValidity: 30
        TokenValidityUnits:
          AccessToken: days
          IdToken: days
          RefreshToken: days