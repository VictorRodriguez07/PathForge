org: victor2424
service: pathforge

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  stage: ${opt:stage, 'dev'}
  
  environment:
    STAGE: ${self:provider.stage}
    DATABASE_URL: ${env:DATABASE_URL}

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - logs:CreateLogGroup
            - logs:CreateLogStream
            - logs:PutLogEvents
          Resource: "*"

build:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node20
    platform: node
    external:
      - "@prisma/client"
      - ".prisma"

package:
  individually: true
  patterns:
    - "!node_modules/**"
    - "!src/**"
    - "!prisma/**"
    - "src/generated/prisma/**"

plugins:
  - serverless-offline

functions:
  health:
    handler: src/handlers/health.handler
    memorySize: 128
    timeout: 5
    events:
      - httpApi:
          path: /health
          method: get